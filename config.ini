[app]
# Application display name shown in the top-right header
name = Git Manage Board

# Version string shown next to the app name
version = v1.1.0

[protection]
# Branches that cannot be deleted — EXACT name match (case-sensitive, comma-separated)
protected_branches_exact = develop,main

# Branches that cannot be deleted — CONTAINS match (any branch whose name contains one of these, case-insensitive)
protected_branches_contains = release
